const SOCIAL_POSTS = {
  generated: "2026-05-23",
  version: "v2",
  posts: [
    { id:1, hook_type:"contrarian", topic_cluster:"AI is simpler than you think", format:"short punchy", estimated_engagement:"very high", content:"Someone is making good money from you being confused about AI.\n\nIt is not the AI companies.\n\nIt is the people charging Â£3,000 a day to manage your \"AI transition.\"\n\nI have watched a plumber use ChatGPT to write a quote in 6 minutes.\n\nA nursery manager draft a safeguarding policy in 20 minutes.\n\nA furniture maker answer a month of supplier emails in an afternoon.\n\nNone of them took a course.\n\nNone of them hired anyone.\n\nNone of them read a book about prompting.\n\nThey described their problem in plain English and started testing.\n\nChatGPT is easier to start than Excel.\n\nThe complexity you have been sold is a business model.\n\nHere is what actually works.\n\nPick one thing that wastes your time this week.\n\nOpen ChatGPT.\n\nType: \"I need help with [thing]. Here is what it involves: [describe in two sentences].\"\n\nSee what comes back.\n\nSave this and send it to someone still sitting on the fence." },
    { id:2, hook_type:"pain", topic_cluster:"AI is simpler than you think", format:"short punchy", estimated_engagement:"very high", content:"14 months of \"looking into AI.\"\n\nNot one thing done.\n\nThat is the most common story I hear.\n\nAnd I heard it again last week.\n\nA business owner. Watched the videos. Read the articles. Three webinars.\n\nZero workflows.\n\nWe sat down together.\n\n40 minutes later she had her first AI tool saving time.\n\nThe next morning she messaged me.\n\n\"I saved two hours before lunch.\"\n\nThe information is not your problem.\n\nHere is the test.\n\nName one thing in your business that takes too long.\n\nJust one.\n\nGo to chat.openai.com.\n\nType: \"Help me do [this thing] faster. Here is what it involves: [two sentences].\"\n\nThat is the only start you need.\n\nSave this. Come back to it this week." },
    { id:3, hook_type:"question", topic_cluster:"AI is simpler than you think", format:"short punchy", estimated_engagement:"high", content:"28 of your 40 working hours do not need your brain.\n\nThat is not an insult.\n\nIt is a calculation.\n\nAdmin. Reports. Follow-ups. First drafts. Standard emails.\n\nAI handles all of it.\n\nWhat remains is the 30% that actually needs you.\n\nThe thinking. The relationships. The judgment.\n\nMost founders never reach that 30% because the other 70% fills the day.\n\nHere is how to find your 70%.\n\nWrite down every task you did last week.\n\nMark the ones that were repetitive or could be templated.\n\nThat list is your AI starting point.\n\nWhat does yours look like?\n\nDrop your biggest time drain in the comments.\n\nI will tell you which ones AI can take off your plate today." },
    { id:4, hook_type:"claim", topic_cluster:"Here's what AI is saving businesses right now", format:"story", estimated_engagement:"very high", content:"A Manchester recruitment firm went from 4 days to 6 hours on shortlisting.\n\nHere is the exact workflow they used.\n\nThey had 40 vacancies a month. CV screening was eating the week.\n\nOne afternoon they mapped where the time was going.\n\nThen they built two prompts.\n\nStep 1: CV screening.\nPaste the job brief into ChatGPT.\nAdd the CVs as text.\nType: \"Score each candidate out of 10 against this brief and explain in 3 bullet points.\"\n45 minutes per vacancy became 4 minutes.\n\nStep 2: First-contact emails.\nTemplate prompt. Candidate name, role, one CV detail.\nPersonalised. Two minutes per vacancy.\n\nNo new software. No new hires. Â£20 a month.\n\n4 days became 6 hours.\n\nWhat task is eating your week right now?\n\nDrop it in the comments. I will tell you what I would try first." },
    { id:5, hook_type:"list", topic_cluster:"Here's what AI is saving businesses right now", format:"list", estimated_engagement:"high", content:"5 things your competitors are doing with AI right now.\n\nAnd the exact prompt for each one.\n\n1. First drafts of client reports.\nPaste your meeting notes.\nType: \"Write a first-draft client report. Formal tone. Sections: summary, findings, next steps. 400 words.\"\nSaves 60 to 90 minutes. Every time.\n\n2. Answering enquiries out of hours.\nGo to ChatGPT. Click Explore GPTs, then Create.\nUpload your FAQ doc. Write two sentences about your business.\nIt handles enquiries while you sleep. Setup: 25 minutes. Cost: zero extra.\n\n3. Writing job specs.\nType: \"Write a job description for [role]. Plain English. 400 words. Include responsibilities, requirements, and what a strong applicant looks like.\"\nDone in 3 minutes.\n\n4. Summarising documents before a meeting.\nUpload the PDF. Type: \"Summarise in 10 bullet points. Flag anything needing a decision or carrying a risk.\"\n30 pages in under a minute.\n\n5. Drafting standard emails.\nPaste the email you received.\nType: \"Write a professional reply that [what you need to say]. One paragraph.\"\n3 minutes instead of 20.\n\nAll of it available today on a standard ChatGPT subscription.\n\nSave this. Pass it to whoever is still doing these manually." },
    { id:6, hook_type:"contrarian", topic_cluster:"Here's what AI is saving businesses right now", format:"short punchy", estimated_engagement:"very high", content:"Your staff are not afraid of AI.\n\nThey are afraid you will buy it and expect miracles from them on day one.\n\nI have spoken to enough people in this situation to know the pattern.\n\nThe anxiety is not about losing a job.\n\nIt is about being handed a tool with no training and judged on the results.\n\nHere is what the businesses doing this well have figured out.\n\nThey start with one person.\n\nFind someone curious. Not technical. Curious.\n\nGive them one task to try with AI.\n\nLet them figure it out.\n\nThen let them show everyone else.\n\nBottom-up adoption works better than top-down mandates.\n\nEvery time.\n\nIs there one person in your team who would run with this?\n\nTag them in the comments." },
    { id:7, hook_type:"contrarian", topic_cluster:"Most SMEs are making this mistake", format:"short punchy", estimated_engagement:"very high", content:"Most people asking \"what can AI do?\" are asking the wrong question.\n\nIt leads you down rabbit holes of demos and tutorials.\n\nIt keeps you in thinking mode and out of doing mode.\n\nThe right question is this:\n\n\"What am I doing right now that I hate doing?\"\n\nWrite it down.\n\nThat is your AI use case.\n\nNot a technology choice.\n\nA time choice.\n\nHere is the 10-minute test.\n\nTake your task.\n\nType it into ChatGPT as if you were explaining it to a new employee.\n\nAsk it to help you do it.\n\nSee what happens.\n\nNo course required. No consultant needed.\n\nSave this and try it today." },
    { id:8, hook_type:"pain", topic_cluster:"Most SMEs are making this mistake", format:"short punchy", estimated_engagement:"very high", content:"Waiting for the right moment to start with AI is costing you Â£3,000 a month.\n\nNot a made-up number.\n\nThat is what most SMEs lose in unbillable admin time every single month.\n\nTime that AI can take back.\n\nI see the pattern every week.\n\nBusiness owners who know they need to start.\n\nWho agree AI will change things.\n\nWho are waiting for the right moment.\n\nThere is no right moment.\n\nThere is just the work piling up.\n\nAnd a competitor who started six months ago.\n\nThey are not better than you.\n\nThey are faster.\n\nHere is the honest question.\n\nWhat is the single biggest time drain in your business right now?\n\nName it below.\n\nI will tell you whether AI can fix it today." },
    { id:9, hook_type:"question", topic_cluster:"Most SMEs are making this mistake", format:"short punchy", estimated_engagement:"high", content:"Only 30% of your week actually needs your brain.\n\nMost founders are shocked by that number.\n\nBut count it up.\n\nAdmin. Emails. First drafts. Reports. Standard responses. Data entry.\n\nNone of that requires what you built your business on.\n\nAnd yet it fills your day.\n\nHere is an exercise worth doing.\n\nTrack your time for one week.\n\nUse any notes app. Just write what you did and how long it took.\n\nAt the end, mark anything that was repetitive, templated, or admin-heavy.\n\nThat pile is your AI starting point.\n\nMost people find it is between 50% and 70% of their week.\n\nWhat would change if you got that time back?\n\nPost your biggest time drain below.\n\nI read every comment." },
    { id:10, hook_type:"pain", topic_cluster:"A specific sector story", format:"story", estimated_engagement:"very high", content:"A firm of accountants in Cheshire cancelled their Saturday morning meeting.\n\nNot because they stopped caring.\n\nBecause they stopped needing it.\n\nEvery Saturday for years.\n\nTwo hours. Partners only.\n\nGoing through client queries that had built up all week.\n\nNot because they wanted to work Saturdays.\n\nBecause they had no better system.\n\nWe built one in an afternoon.\n\nEvery inbound query gets categorised automatically.\n\nUrgent cases get flagged immediately.\n\nStandard queries get a first-response draft within minutes.\n\nThe Saturday call now lasts 22 minutes.\n\nSome weeks they cancel it entirely.\n\nThe tool they use costs Â£20 a month.\n\nIf you run an accountancy practice and inbound queries are eating your time, reply here.\n\nI will walk you through what they built. No charge." },
    { id:11, hook_type:"claim", topic_cluster:"A specific sector story", format:"story", estimated_engagement:"very high", content:"A solicitor in Manchester billed 11 extra hours last month.\n\nShe didn't work more.\n\nShe typed less.\n\nCase notes, client letters, file summaries used to eat her afternoons.\n\nNow she talks. AI transcribes and drafts.\n\nShe reviews. Edits what needs editing. Signs off.\n\nHer words. Her judgment. Her expertise.\n\nJust not her typing.\n\nHere is the exact process.\n\nAfter each client call she records a voice note.\n\nShe uploads it to an AI tool.\n\nTypes: \"Turn this into a case note in standard legal format. Flag any actions.\"\n\nDone in 90 seconds.\n\nThat is 20 minutes per client saved.\n\nAt her billing rate, 11 hours is not a small number.\n\nFor a one-person firm, it changes the month.\n\nSave this. Share it with any solicitor you know who is buried in admin." },
    { id:12, hook_type:"contrarian", topic_cluster:"Most SMEs are making this mistake", format:"short punchy", estimated_engagement:"very high", content:"If you're using AI to answer questions, you're wasting it.\n\nThat is what most people do at the start.\n\nType a question in. Get an answer back.\n\nFeel like they're using AI.\n\nThey are not.\n\nThey are doing a more expensive version of Google.\n\nAI is not a question-answering tool.\n\nIt is a workflow tool.\n\nHere is the difference.\n\nQuestion mode: \"What is the best way to write a proposal?\"\n\nWorkflow mode: \"I need to write a proposal for a manufacturing firm in Leeds. Here are my notes from the meeting: [paste notes]. Draft a 3-page proposal in a professional tone.\"\n\nOne saves you 10 minutes.\n\nThe other saves you 3 hours.\n\nSame tool. Different way of using it.\n\nTry the workflow version on one task this week.\n\nSave this for when you need a reminder." },
    { id:13, hook_type:"list", topic_cluster:"A specific sector story", format:"list", estimated_engagement:"high", content:"Financial advisers: your competitors are cutting client review prep time in half.\n\nHere is exactly what they are using.\n\n1. Suitability reports.\nPaste client notes into Claude or ChatGPT.\nType: \"Draft a suitability report. Risk profile: [x]. Objective: [x]. Recommendation: [x].\"\nReview. Edit. Sign off.\n40 minutes becomes 12.\n\n2. Meeting summaries.\nRecord the call or take rough notes.\nType: \"Turn these into a structured meeting summary. Include: decisions made, next steps, open questions.\"\nDone in 3 minutes.\n\n3. Document follow-up.\nType: \"Write a follow-up email to a client asking them to provide [document list]. Friendly but clear. 150 words.\"\nPersonalised. Professional. 90 seconds.\n\n4. Pre-review research.\nType: \"Summarise the performance of [fund] over the last 12 months in plain English. Key points only.\"\nWalk in prepared.\n\nThe compliance work is still yours.\n\nThe thinking is still yours.\n\nThe typing doesn't have to be.\n\nSave this. Share it with an adviser who needs to see it." },
    { id:14, hook_type:"pain", topic_cluster:"A specific sector story", format:"story", estimated_engagement:"very high", content:"A construction MD told me he had worked every Sunday for four years.\n\nNot on strategy.\n\nOn tender documents.\n\nThe same sections. Every time.\n\nCompany overview.\n\nHealth and safety statement.\n\nPrevious projects list.\n\nHe had written them so many times he could recite them.\n\nHe still wrote them from scratch every Sunday.\n\nOne afternoon we built his AI tender system.\n\nNow he pastes the tender spec into ChatGPT.\n\nTypes: \"Using my company profile [attached] and previous projects [attached], draft the standard sections for this tender. Match the tone to the specification.\"\n\n15 minutes. Not four hours.\n\nHe still reviews every word.\n\nHe still wins the work.\n\nHe does not do it on Sunday evenings anymore.\n\nWhat is the task eating your weekends?" },
    { id:15, hook_type:"question", topic_cluster:"A specific sector story", format:"short punchy", estimated_engagement:"high", content:"Your team is writing the same 50 emails every week.\n\nAcknowledging enquiries.\n\nSending quotes.\n\nFollowing up on invoices.\n\nConfirming appointments.\n\nChasing documents.\n\nNone of these need writing from scratch.\n\nEvery one of them can be handled with an AI template.\n\nHere is how to set it up.\n\nPick your most common email type.\n\nWrite one good version of it.\n\nThen ask AI: \"Turn this into a reusable template with [x] as a variable for personalisation.\"\n\nSave it.\n\nThe next 50 emails of that type take 90 seconds each instead of 10 minutes.\n\n50 emails. 10 minutes each. That is 8 hours a week.\n\nGiven back. Without hiring anyone.\n\nWhat type of email does your team write most?\n\nDrop it below. I will write you a template prompt." },
    { id:16, hook_type:"contrarian", topic_cluster:"Most SMEs are making this mistake", format:"short punchy", estimated_engagement:"very high", content:"Your competitor is not trying to replace staff with AI.\n\nThey are using AI to do more with the same staff.\n\nThat is the thing most people miss.\n\nThis is not a headcount conversation.\n\nIt is a capacity conversation.\n\nThe same 10 people doing the work of 14.\n\nWithout burning out.\n\nWithout a bigger wage bill.\n\nHere is where they are starting.\n\nThey map the five tasks consuming the most time each week.\n\nThey pick the most repetitive one.\n\nThey spend one afternoon building an AI solution.\n\nThen they move to the next.\n\nThat is the entire strategy.\n\nBoring. Methodical. Compounding.\n\nWhile you wait for the perfect moment, they are getting faster every month.\n\nWhat are your five most time-consuming tasks?\n\nWrite them down.\n\nThat list is worth more than any AI strategy document." },
    { id:17, hook_type:"claim", topic_cluster:"Here's what AI is saving businesses right now", format:"story", estimated_engagement:"very high", content:"This business owner added 2 hours to every Monday without working a single extra minute.\n\nEvery Monday used to start the same way.\n\nTwo hours sorting weekend enquiries.\n\nReading. Deciding priority. Writing responses.\n\nNot strategy. Admin.\n\nNow an AI agent handles all three before he wakes up.\n\nBy 8am there are drafted replies waiting for his approval.\n\nHe reads them. Sends the ones that are right. Tweaks the ones that need it.\n\nOn client calls by 9am.\n\nHere is how you can build the same thing.\n\nGo to ChatGPT. Click Explore GPTs. Click Create.\n\nGive it your company background and your standard reply style.\n\nTest it on 10 real enquiries.\n\nRefine. Then let it draft.\n\nYou stay in control. It does the legwork.\n\nTwo hours. Every Monday. Back.\n\nSave this." },
    { id:18, hook_type:"list", topic_cluster:"AI tool of the week", format:"list", estimated_engagement:"high", content:"3 AI tools your competitors are already using.\n\nAnd the exact thing to try first with each.\n\n1. Claude (claude.ai)\nBetter than ChatGPT for long documents and precise writing.\nTry this: paste a 10-page report and type \"Summarise in 10 bullet points. Flag anything needing a decision or carrying a risk.\"\nEspecially useful for legal, compliance, and financial services.\n\n2. Perplexity (perplexity.ai)\nResearch that used to take an hour takes 5 minutes.\nTry this: type your client's industry and ask \"What are the biggest challenges facing [industry] in the UK right now?\"\nWalk into every client meeting sharper.\n\n3. Notion AI\nIf your team already uses Notion, AI is built in at no extra cost.\nTry this: paste meeting notes and type \"Summarise into a structured action list with owners and deadlines.\"\nNever leave a meeting unclear again.\n\nNone of these cost more than a team lunch.\n\nAll of them will change how you work within a week.\n\nWhich one are you starting with?" },

let socialPosts = SOCIAL_POSTS;

function save() {
  try {
    localStorage.setItem('sent_ids', JSON.stringify([...sentIds]));
    localStorage.setItem('interested_ids', JSON.stringify([...interestedIds]));
    localStorage.setItem('used_post_ids', JSON.stringify([...usedPostIds]));
  } catch(e) {}
}

// âââ TABS ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-outreach').style.display = tab === 'outreach' ? 'flex' : 'none';
  document.getElementById('tab-social').style.display = tab === 'social' ? 'flex' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='outreach')||(i===1&&tab==='social')));

// âââ PROGRESS ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function updateProgress() {
  const today = contacts.filter(c => c.day==='today');
  const sent = today.filter(c => sentIds.has(c.id)).length;
  document.getElementById('progressBar').style.width = Math.round(sent/today.length*100)+'%';
  document.getElementById('progressText').textContent = sent+' / '+today.length+' sent';
}

// âââ SIDEBAR âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function renderSidebar() {
  ['contactList','mondayList'].forEach(id => document.getElementById(id).innerHTML='');
  contacts.forEach(c => {
    const div = document.createElement('div');
    const isInterested = interestedIds.has(c.id);
    const isSent = sentIds.has(c.id);
    div.className = 'contact-item' +
      (activeId===c.id ? ' active' : '') +
      (isInterested ? ' interested' : '') +
      (isSent && !isInterested ? ' sent' : '');
    div.innerHTML = `
      <div class="contact-num">${c.id}</div>
      <div class="contact-info">
        <div class="contact-name">${c.name}</div>
        <div class="contact-company">${c.company}</div>
      </div>
      ${isInterested ? '<div class="interested-dot"></div>' : (isSent ? '<div class="status-icon">â</div>' : '')}
    `;
    div.onclick = () => selectContact(c.id);
    document.getElementById(c.day==='today'?'contactList':'mondayList').appendChild(div);
  });
}

// âââ CONTACT VIEW ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function selectContact(id) {
  activeId = id;
  const c = contacts.find(x=>x.id===id);
  const isInterested = interestedIds.has(id);
  const isSent = sentIds.has(id);
  if (!activeFollowupTab[id]) activeFollowupTab[id] = 0;
  renderSidebar();
  renderPanel(c, isInterested, isSent);
}

function renderPanel(c, isInterested, isSent) {
  const panel = document.getElementById('panel');
  const followupSection = isInterested ? buildFollowupSection(c.id, isInterested) : '';

  panel.innerHTML = `
    <div style="flex-shrink:0;">
      <div class="contact-full-name">${c.name}${isInterested ? '<span class="interested-badge">Interested</span>' : ''}</div>
      <div class="contact-role">${c.role} &middot; ${c.company}</div>
      <span class="sector-pill">${c.sector}</span>
    </div>

    <div class="why-block"><strong>Why them</strong>${c.why}</div>

    <div class="message-block">
      <div class="block-label">Initial DM â copy and paste into LinkedIn</div>
      <div class="message-text">${c.message}</div>
    </div>

    <div class="action-bar">
      <button class="btn btn-copy" id="copyBtn" onclick="copyInitial(${c.id})">Copy message</button>
      <a class="btn btn-linkedin" href="${c.linkedin}" target="_blank" rel="noopener">Open LinkedIn â</a>
      <button class="btn btn-interested ${isInterested?'flagged':''}" id="intBtn" onclick="toggleInterested(${c.id})">
        ${isInterested ? 'Interested' : 'Flag interested'}
      </button>
      <button class="btn btn-sent ${isSent?'marked':''}" id="sentBtn" onclick="markSent(${c.id})">
        ${isSent ? 'â Sent' : 'Mark sent'}
      </button>
    </div>

    ${c.id===10 && c.day==='today' ? '<div class="limit-warning">Stop here today. Contacts 11-20 go out on Monday.</div>' : ''}

    ${isInterested ? `
    <div class="message-block" id="followupBlock">
      <div class="followup-tabs" id="followupTabs"></div>
      <div class="message-text" id="followupText"></div>
      <div style="padding:10px 14px;border-top:1px solid #1e2235;display:flex;gap:8px;flex-shrink:0;">
        <button class="btn btn-copy" style="font-size:12px;padding:9px 14px;" id="copyFollowupBtn" onclick="copyFollowup(${c.id})">Copy this message</button>
      </div>
    </div>` : ''}
  `;

  if (isInterested) renderFollowupTabs(c.id);
  if (c.id === 10 && c.day === 'today') {
    // handled inline
  }
}

function renderFollowupTabs(contactId) {
  const allSteps = [...FOLLOWUPS.interested, ...FOLLOWUPS.noresponse];
  const tabsEl = document.getElementById('followupTabs');
  const textEl = document.getElementById('followupText');
  if (!tabsEl || !textEl) return;
  const current = activeFollowupTab[contactId] || 0;

  tabsEl.innerHTML = allSteps.map((f,i) => `
    <button class="followup-tab ${i===current?'active':''}" onclick="setFollowupTab(${contactId},${i})">${f.label.split('â')[0].trim()}</button>
  `).join('');

  textEl.textContent = allSteps[current].text;

  // Show sublabel
  const sublabel = document.createElement('div');
  sublabel.style.cssText = 'font-size:11px;color:#4a5068;padding:6px 16px 0;flex-shrink:0;';
  sublabel.textContent = allSteps[current].sublabel;
  tabsEl.parentElement.insertBefore(sublabel, textEl);
}

function setFollowupTab(contactId, idx) {
  activeFollowupTab[contactId] = idx;
  const allSteps = [...FOLLOWUPS.interested, ...FOLLOWUPS.noresponse];
  document.querySelectorAll('.followup-tab').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.getElementById('followupText').textContent = allSteps[idx].text;
  const sublabels = document.querySelectorAll('[style*="4a5068"][style*="11px"]');
  if (sublabels.length) sublabels[sublabels.length-1].textContent = allSteps[idx].sublabel;
}

function copyInitial(id) {
  const c = contacts.find(x=>x.id===id);
  navigator.clipboard.writeText(c.message).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.textContent='Copied';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy message';btn.classList.remove('copied');},2000);
  });
}

function copyFollowup(contactId) {
  const allSteps = [...FOLLOWUPS.interested, ...FOLLOWUPS.noresponse];
  const idx = activeFollowupTab[contactId]||0;
  navigator.clipboard.writeText(allSteps[idx].text).then(()=>{
    const btn=document.getElementById('copyFollowupBtn');
    btn.textContent='Copied';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy this message';btn.classList.remove('copied');},2000);
  });
}

function markSent(id) {
  sentIds.add(id); save(); updateProgress(); renderSidebar();
  const btn=document.getElementById('sentBtn');
  if(btn){btn.textContent='â Sent';btn.classList.add('marked');}
  const next=contacts.find(c=>c.id>id&&!sentIds.has(c.id)&&c.day==='today');
  if(next) setTimeout(()=>selectContact(next.id),400);
}

function toggleInterested(id) {
  if(interestedIds.has(id)){interestedIds.delete(id);}else{interestedIds.add(id);sentIds.add(id);}
  save(); updateProgress();
  selectContact(id);
}

// âââ SOCIAL CONTENT ââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ
function renderSocial() {
  const today = new Date().toISOString().slice(0,10);

  // Best-effort: try to load tracker to find today's post ID
  // This will fail silently when opened via file:// â that's fine
  fetch('linkedin-post-tracker.json')
    .then(r => r.ok ? r.json() : null)
    .then(tracker => {
      if (tracker && tracker.last_posted === today && tracker.used_ids && tracker.used_ids.length) {
        todayPostId = tracker.used_ids[tracker.used_ids.length - 1];
      }
    })
    .catch(()=>{})
    .finally(() => renderPosts());
}

function renderPosts() {
  const panel = document.getElementById('socialPanel');
  if (!socialPosts || !socialPosts.posts) return;

  let filtered = activeFilter==='all' ? socialPosts.posts : socialPosts.posts.filter(p=>p.hook_type===activeFilter);

  // Pin today's post first if it exists in the filtered set
  let todayPost = todayPostId ? filtered.find(p=>p.id===todayPostId) : null;
  let rest = todayPost ? filtered.filter(p=>p.id!==todayPostId) : filtered;
  const ordered = todayPost ? [todayPost, ...rest] : rest;

  let html = '';
  if (socialPosts.research_summary) {
    html += `<div class="research-summary"><strong>Research Summary â what the research found</strong>${socialPosts.research_summary}</div>`;
  }

  ordered.forEach(p => {
    const isUsed = usedPostIds.has(p.id);
    const isToday = p.id === todayPostId;
    const tagClass = `tag-${p.hook_type}`;
    const todayBorder = isToday ? 'border-left:3px solid #f9a825;' : '';
    html += `
      <div class="post-card" id="post-${p.id}" style="${todayBorder}">
        <div class="post-meta">
          ${isToday ? '<span class="post-tag" style="background:#2a1a00;color:#f9a825;">TODAY</span>' : ''}
          <span class="post-tag ${tagClass}">${p.hook_type}</span>
          <span class="post-cluster">${p.topic_cluster}</span>
          <span class="post-num">#${p.id}</span>
          ${isUsed && !isToday ? '<span style="font-size:10px;color:#2e7d32;font-weight:700;">USED</span>' : ''}
        </div>
        <div class="post-body">${p.content}</div>
        <div class="post-actions">
          <button class="btn-sm btn-sm-copy" id="pcopy-${p.id}" onclick="copyPost(${p.id})">Copy post</button>
          <button class="btn-sm btn-sm-used ${isUsed?'marked':''}" id="pused-${p.id}" onclick="markPostUsed(${p.id})">${isUsed?'Used':'Mark used'}</button>
        </div>
      </div>`;
  });

  if (!ordered.length) html = '<div class="social-loading"><p>No posts match this filter.</p></div>';
  panel.innerHTML = html;
}

function filterPosts(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPosts();
}

function copyPost(id) {
  if (!socialPosts) return;
  const p = socialPosts.posts.find(x=>x.id===id);
  navigator.clipboard.writeText(p.content).then(()=>{
    const btn=document.getElementById('pcopy-'+id);
    btn.textContent='Copied';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy post';btn.classList.remove('copied');},2000);
  });
}

function markPostUsed(id) {
  usedPostIds.add(id); save();
  const btn=document.getElementById('pused-'+id);
  if(btn){btn.textContent='Used';btn.classList.add('marked');}
}

renderSidebar();
updateProgress();
const firstUnsent = contacts.find(c=>c.day==='today'&&!sentIds.has(c.id));
if(firstUnsent) selectContact(firstUnsent.id);
